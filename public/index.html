<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - Backend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== MESMO CSS DA VERSÃO ANTERIOR (mantido intacto) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        #login-container { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .login-box { background: #1e293b; padding: 40px 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); width: 100%; border: 1px solid #334155; transition: 0.3s; }
        .login-box h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; text-align: center; }
        .login-box .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        .tab-buttons { display: flex; background: #0f172a; border-radius: 12px; padding: 4px; margin-bottom: 25px; }
        .tab-buttons button { flex: 1; padding: 10px; border: none; background: transparent; color: #94a3b8; font-weight: 600; font-size: 14px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .tab-buttons button.active { background: #7c3aed; color: #fff; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 14px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: #f1f5f9; font-size: 15px; transition: 0.3s; outline: none; }
        .form-group input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #6d28d9); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
        .error-msg { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
        #app { width: 100%; max-width: 1200px; padding: 20px; display: none; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 16px 28px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 35px; flex-wrap: wrap; gap: 15px; }
        .navbar .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .navbar .user-info { display: flex; align-items: center; gap: 20px; }
        .navbar .user-info span { font-weight: 500; color: #cbd5e1; }
        .navbar .user-info i { font-size: 28px; color: #a78bfa; background: #0f172a; padding: 8px; border-radius: 50%; }
        .btn-logout { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: #ef4444; color: #fff; }
        .dashboard-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .dashboard-title small { font-weight: 400; font-size: 16px; color: #94a3b8; margin-left: 10px; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 25px; }
        .course-card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .course-card:hover { transform: translateY(-6px); border-color: #7c3aed; box-shadow: 0 12px 30px rgba(124,58,237,0.15); }
        .course-thumb { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 48px; background: #0f172a; }
        .course-info { padding: 20px; }
        .course-info h3 { font-size: 18px; margin-bottom: 6px; }
        .course-info p { color: #94a3b8; font-size: 14px; margin-bottom: 14px; line-height: 1.5; }
        .course-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .course-meta .level { background: #0f172a; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #a78bfa; }
        .course-meta .students { font-size: 13px; color: #64748b; }
        .btn-enroll { width: 100%; padding: 12px; background: #7c3aed; border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-enroll:hover { background: #6d28d9; }
        .btn-enroll.enrolled { background: #22c55e; cursor: default; }
        .btn-enroll.enrolled:hover { background: #22c55e; }
        @media (max-width: 600px) { .login-box { padding: 30px 20px; } .navbar { flex-direction: column; align-items: stretch; text-align: center; } .navbar .user-info { justify-content: center; flex-wrap: wrap; } .dashboard-title { font-size: 20px; } .course-grid { grid-template-columns: 1fr; } }
        .success-msg { color: #4ade80; }
    </style>
</head>
<body>

    <!-- ======================== TELA DE LOGIN ======================== -->
    <div id="login-container">
        <div class="login-box">
            <h1>EduConnect</h1>
            <p class="subtitle">Aprenda com os melhores</p>

            <div class="tab-buttons">
                <button id="tabLogin" class="active" onclick="switchTab('login')">Entrar</button>
                <button id="tabRegister" onclick="switchTab('register')">Cadastrar</button>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="handleLogin()">Entrar na plataforma</button>
                <p class="error-msg" id="loginError"></p>
            </div>

            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nome completo</label>
                    <input type="text" id="regName" placeholder="Maria Silva">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="regEmail" placeholder="maria@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha (mínimo 4 caracteres)</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="handleRegister()">Criar conta gratuita</button>
                <p class="error-msg" id="registerError"></p>
            </div>
        </div>
    </div>

    <!-- ======================== DASHBOARD ======================== -->
    <div id="app">
        <nav class="navbar">
            <div class="logo"><i class="fas fa-graduation-cap"></i> EduConnect</div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="displayName">Usuário</span>
                <button class="btn-logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </nav>

        <div class="dashboard-title">
            🚀 Explore nossos cursos
            <small>Domine novas habilidades</small>
        </div>

        <div class="course-grid" id="courseGrid"></div>
    </div>

    <script>
        // ======================================================
        //  FRONT-END CONECTADO AO BACKEND (Node.js + Express)
        // ======================================================

        let currentUser = null;
        let courses = [];

        // ===== UTILITÁRIOS =====
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                document.getElementById('loginError').textContent = '';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                document.getElementById('registerError').textContent = '';
            }
        }

        function showError(id, msg) {
            document.getElementById(id).textContent = msg;
        }

        // ===== FUNÇÕES DE API =====

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                return showError('loginError', 'Preencha todos os campos.');
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    return showError('loginError', data.error || 'Erro no login.');
                }

                currentUser = data;
                showError('loginError', '');
                renderApp();
            } catch (err) {
                showError('loginError', 'Erro de conexão com o servidor.');
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!name || !email || !password) {
                return showError('registerError', 'Todos os campos são obrigatórios.');
            }
            if (password.length < 4) {
                return showError('registerError', 'A senha deve ter no mínimo 4 caracteres.');
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    return showError('registerError', data.error || 'Erro no cadastro.');
                }

                showError('registerError', '✅ Conta criada com sucesso!');
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';

                // Faz login automático
                currentUser = data;
                renderApp();
            } catch (err) {
                showError('registerError', 'Erro de conexão com o servidor.');
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                currentUser = null;
                document.getElementById('app').style.display = 'none';
                document.getElementById('login-container').style.display = 'flex';
                document.getElementById('loginError').textContent = '';
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch (err) {
                alert('Erro ao sair. Tente novamente.');
            }
        }

        async function handleEnroll(courseId) {
            if (!currentUser) return;

            try {
                const res = await fetch('/api/enroll', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courseId })
                });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || 'Erro ao se inscrever.');
                    return;
                }

                currentUser = data;
                renderApp(); // Re-renderiza atualizando os botões
            } catch (err) {
                alert('Erro de conexão com o servidor.');
            }
        }

        // ===== RENDERIZAÇÃO =====

        async function checkSession() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data;
                    renderApp();
                } else {
                    showLogin();
                }
            } catch (err) {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('app').style.display = 'none';
            document.getElementById('login-container').style.display = 'flex';
        }

        async function renderApp() {
            if (!currentUser) {
                return showLogin();
            }

            document.getElementById('login-container').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('displayName').textContent = currentUser.name;

            // Busca os cursos (sempre do backend)
            try {
                const res = await fetch('/api/courses');
                if (!res.ok) throw new Error('Erro ao carregar cursos');
                courses = await res.json();
            } catch (err) {
                alert('Não foi possível carregar os cursos.');
                return;
            }

            const grid = document.getElementById('courseGrid');
            grid.innerHTML = '';

            const enrolledIds = currentUser.enrolled || [];

            courses.forEach(course => {
                const isEnrolled = enrolledIds.includes(course.id);

                const card = document.createElement('div');
                card.className = 'course-card';

                card.innerHTML = `
                    <div class="course-thumb" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                        <span style="font-size: 64px; opacity: 0.9;">${course.icon}</span>
                    </div>
                    <div class="course-info">
                        <h3>${course.title}</h3>
                        <p>${course.description}</p>
                        <div class="course-meta">
                            <span class="level"><i class="fas fa-signal"></i> ${course.level}</span>
                            <span class="students"><i class="fas fa-users"></i> ${course.students} alunos</span>
                        </div>
                        <button class="btn-enroll ${isEnrolled ? 'enrolled' : ''}" 
                                ${isEnrolled ? 'disabled' : ''}>
                            ${isEnrolled ? '✅ Inscrito' : '📚 Matricular-se'}
                        </button>
                    </div>
                `;

                if (!isEnrolled) {
                    const btn = card.querySelector('.btn-enroll');
                    btn.addEventListener('click', () => handleEnroll(course.id));
                }

                grid.appendChild(card);
            });
        }

        // ===== INICIALIZAÇÃO =====
        window.onload = function() {
            checkSession();
        };

        // Enter key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const loginForm = document.getElementById('loginForm');
                if (loginForm.style.display !== 'none') {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        console.log('🚀 EduConnect com Backend rodando!');
    </script>

</body>
</html>
